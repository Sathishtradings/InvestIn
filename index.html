<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>InvestIN — Live NSE</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
}

.header{
  padding:12px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.tabs{
  display:flex;
  gap:10px;
  padding:10px;
  background:#fff;
}

.tab{
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  background:#eee;
}

.tab.active{
  background:#1D9E75;
  color:#fff;
}

.panel{display:none;padding:15px}
.panel.active{display:block}

.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.up{color:green}
.dn{color:red}

.flash-up{background:#E1F5EE}
.flash-dn{background:#FCEBEB}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h3>InvestIN</h3>
  <button onclick="refreshAll()">Refresh</button>
  <span id="upd">Loading...</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('wl')">Watchlist</div>
  <div class="tab" onclick="switchTab('sig')">Signals</div>
</div>

<!-- WATCHLIST -->
<div class="panel active" id="wl">
  <div id="wl-load">Loading prices...</div>
  <div id="wl-grid"></div>
</div>

<!-- SIGNAL -->
<div class="panel" id="sig">
  <div class="card" id="signal-box">Loading signal...</div>
</div>

<script>

const CACHE_TTL = 60000;
const cache = {};

const WL = [
  {name:'Infosys', sym:'INFY.NS'},
  {name:'Reliance', sym:'RELIANCE.NS'}
];

async function fetchPrice(sym){
  if(cache[sym] && Date.now()-cache[sym].ts < CACHE_TTL)
    return cache[sym].data;

  try{
    let url = "https://api.allorigins.win/raw?url=" +
      encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+sym);

    let res = await fetch(url);
    if(!res.ok) throw new Error();

    let json = await res.json();
    let meta = json.chart.result[0].meta;

    let price = meta.regularMarketPrice;
    let prev = meta.previousClose;

    let obj = {
      price,
      change: price-prev,
      pct: ((price-prev)/prev)*100
    };

    cache[sym] = {data:obj, ts:Date.now()};
    return obj;

  }catch(e){
    console.log("Error fetching",sym);
    return null;
  }
}

async function refreshAll(){
  document.getElementById("wl-load").style.display="block";
  document.getElementById("wl-grid").innerHTML="";

  let prices={};

  await Promise.all(WL.map(async s=>{
    let d = await fetchPrice(s.sym);
    if(d) prices[s.sym]=d;
  }));

  renderWatchlist(prices);

  document.getElementById("upd").innerText =
    "Updated "+new Date().toLocaleTimeString();
}

function renderWatchlist(prices){
  let grid = document.getElementById("wl-grid");
  document.getElementById("wl-load").style.display="none";

  grid.innerHTML = WL.map((s,i)=>{
    let d = prices[s.sym];
    if(!d) return "<div>Error</div>";

    let up = d.pct>=0;

    return `
    <div class="card ${up?'flash-up':'flash-dn'}">
      <b>${s.name}</b><br>
      ₹${d.price.toFixed(2)}<br>
      <span class="${up?'up':'dn'}">
        ${d.pct.toFixed(2)}%
      </span>
      <br>
      <button onclick="event.stopPropagation(); removeStock(${i})">Remove</button>
    </div>
    `;
  }).join("");
}

function removeStock(i){
  WL.splice(i,1);
  refreshAll();
}

/* SIGNAL */
async function loadSignal(){
  try{
    let res = await fetch('/signal');
    let d = await res.json();

    document.getElementById("signal-box").innerHTML = `
      <b>NIFTY SIGNAL</b><br>
      Price: ₹${d.price}<br>
      Signal: ${d.signal}<br>
      Option: ${d.option}
    `;
  }catch(e){
    document.getElementById("signal-box").innerHTML =
      "Backend not connected";
  }
}

/* TAB */
function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));

  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add("active");
  document.getElementById(tab).classList.add("active");

  if(tab==="sig") loadSignal();
}

/* AUTO REFRESH */
setInterval(()=>{
  if(!document.hidden) refreshAll();
},60000);

refreshAll();

</script>

</body>
</html>
