<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>InvestIN — Live NSE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* --- SAME CSS + ADDED FLASH --- */
.flash-up{background:#E1F5EE}
.flash-dn{background:#FCEBEB}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-l">
    <div class="logo"></div>
    <div>
      <div class="app-title">InvestIN</div>
      <div class="app-sub">Live NSE · Yahoo Finance</div>
    </div>
  </div>
  <div class="hdr-r">
    <button onclick="refreshAll()">Refresh</button>
    <span id="upd">Loading...</span>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="sw('wl')">Watchlist</div>
  <div class="tab" onclick="sw('sig')">Signals</div>
</div>

<!-- WATCHLIST -->
<div class="panel active" id="p-wl">
  <div id="wl-load">Loading...</div>
  <div id="wl-grid"></div>
</div>

<!-- SIGNAL PANEL -->
<div class="panel" id="p-sig">
  <div id="signal-box">Loading signal...</div>
</div>

</div>

<script>

var CACHE_TTL = 60000;
var cache = {};

async function fetchYF(symbol){
  if(cache[symbol] && Date.now()-cache[symbol].ts < CACHE_TTL)
    return cache[symbol].d;

  try{
    let url = "https://api.allorigins.win/raw?url=" +
      encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+symbol);

    let r = await fetch(url);
    if(!r.ok) throw new Error();

    let json = await r.json();
    let m = json.chart.result[0].meta;

    let price = m.regularMarketPrice;
    let prev = m.previousClose;

    let obj = {
      price,
      chg: price-prev,
      pct: ((price-prev)/prev)*100
    };

    cache[symbol] = {d:obj, ts:Date.now()};
    return obj;

  }catch(e){
    console.warn("Fetch failed",symbol);
    return null;
  }
}

var WL=[{n:"INFY",s:"INFY.NS"}];

async function refreshAll(){
  document.getElementById("wl-load").style.display="block";
  document.getElementById("wl-grid").style.display="none";

  let prices={};
  await Promise.all(WL.map(async w=>{
    let d=await fetchYF(w.s);
    if(d) prices[w.s]=d;
  }));

  renderWL(prices);
  document.getElementById("upd").innerText="Updated";
}

function renderWL(prices){
  let g=document.getElementById("wl-grid");
  g.style.display="block";
  document.getElementById("wl-load").style.display="none";

  g.innerHTML = WL.map((w,i)=>{
    let d=prices[w.s];
    if(!d) return "Error";

    let up=d.pct>=0;

    return `
    <div class="${up?'flash-up':'flash-dn'}">
      ${w.n} ₹${d.price.toFixed(2)} (${d.pct.toFixed(2)}%)
      <button onclick="event.stopPropagation(); removeWatch(${i})">X</button>
    </div>`;
  }).join("");
}

function removeWatch(i){
  WL.splice(i,1);
  refreshAll();
}

async function loadSignal(){
  try{
    let res = await fetch('/signal');
    let d = await res.json();

    document.getElementById('signal-box').innerHTML = `
      Price: ₹${d.price}<br>
      Signal: ${d.signal}<br>
      Option: ${d.option}`;
  }catch(e){
    document.getElementById('signal-box').innerText="Error";
  }
}

function sw(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+name).classList.add('active');

  if(name==='sig') loadSignal();
}

setInterval(()=>{
  if(!document.hidden) refreshAll();
},60000);

refreshAll();

</script>
</body>
</html>
